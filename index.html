<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover"/>
<meta name="theme-color" content="#00B24B"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="apple-mobile-web-app-title" content="GAUKLER"/>
<title>GAUKLER · Reservas</title>
<link rel="manifest" href="./manifest.json"/>
<link rel="apple-touch-icon" href="./icon-192.png"/>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;500;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --black:#0A0A0A;--s1:#111;--s2:#181818;--s3:#222;
  --border:#2C2C2C;--border2:#383838;
  --green:#00B24B;--green-d:#009A40;--green-bg:#00B24B18;--green-xb:#00B24B0C;
  --white:#fff;--muted:#888;--faint:#555;
  --red:#E53935;--red-bg:#E5393518;--amber:#F59E0B;
  --safe-top:env(safe-area-inset-top,0px);--safe-bot:env(safe-area-inset-bottom,0px);
}
html,body{height:100%;overflow:hidden;background:var(--black);font-family:'Inter',system-ui,sans-serif;color:var(--white)}
#root{display:flex;flex-direction:column;height:100%;max-width:480px;margin:0 auto;background:var(--black);position:relative;overflow:hidden}
::-webkit-scrollbar{width:3px}::-webkit-scrollbar-track{background:var(--s1)}::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px}

#topbar{padding:calc(var(--safe-top) + 12px) 18px 12px;background:var(--s1);border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;flex-shrink:0;z-index:10}
.logo-wrap{display:flex;align-items:center;gap:10px}
.logo-icon{width:34px;height:34px;border-radius:8px;background:var(--green);display:flex;align-items:center;justify-content:center;font-size:18px;box-shadow:0 0 16px #00B24B55;flex-shrink:0}
.logo-text{font-family:'Rajdhani',sans-serif;font-weight:700;font-size:17px;letter-spacing:.06em;color:var(--white);line-height:1}
.logo-sub{font-size:10px;color:var(--muted);letter-spacing:.08em;text-transform:uppercase;margin-top:1px}
.sync-dot{display:inline-block;width:7px;height:7px;border-radius:50%;margin-left:5px;vertical-align:middle}
.sync-ok{background:var(--green);box-shadow:0 0 6px var(--green)}
.sync-off{background:var(--red);box-shadow:0 0 6px var(--red)}
.sync-loading{background:var(--amber);box-shadow:0 0 6px var(--amber);animation:pulse .8s ease infinite}

#nav{padding:8px 0 calc(var(--safe-bot)+8px);background:var(--s1);border-top:1px solid var(--border);display:grid;grid-template-columns:repeat(3,1fr);flex-shrink:0;z-index:10}
.nav-btn{display:flex;flex-direction:column;align-items:center;gap:3px;padding:6px 0;border:none;background:none;cursor:pointer;color:var(--faint);transition:color .15s}
.nav-btn.active,.nav-btn.active .nav-label{color:var(--green)}
.nav-icon{font-size:20px;line-height:1}
.nav-label{font-size:10px;font-weight:500;letter-spacing:.05em;text-transform:uppercase;font-family:'Rajdhani',sans-serif}

#content{flex:1;overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch}
.view{padding:16px;animation:fadeUp .25s ease both}

@keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes slideUp{from{opacity:0;transform:translateY(30px)}to{opacity:1;transform:translateY(0)}}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}

.stats-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:16px}
.stat-card{background:var(--s2);border:1px solid var(--border);border-radius:12px;padding:16px 14px;position:relative;overflow:hidden}
.stat-val{font-family:'Rajdhani',sans-serif;font-size:36px;font-weight:700;line-height:1;color:var(--white)}
.stat-lbl{font-size:11px;color:var(--muted);letter-spacing:.07em;text-transform:uppercase;margin-top:4px}
.stat-icon{position:absolute;top:10px;right:12px;font-size:24px;opacity:.15}
.stat-accent{border-color:var(--green);background:var(--green-xb)}
.stat-accent .stat-val{color:var(--green)}

.tl-item{display:flex;align-items:flex-start;gap:12px;padding:12px 0;border-bottom:1px solid var(--border)}
.tl-item:last-child{border-bottom:none}
.tl-time{font-family:'Rajdhani',sans-serif;font-size:16px;font-weight:700;min-width:50px;color:var(--white);margin-top:1px}
.tl-dot{width:10px;height:10px;border-radius:50%;background:var(--green);flex-shrink:0;margin-top:5px;box-shadow:0 0 6px var(--green)}
.tl-dot.past{background:var(--faint);box-shadow:none}

.res-card{background:var(--s2);border:1px solid var(--border);border-radius:12px;margin-bottom:10px;overflow:hidden;cursor:pointer}
.res-card:active{opacity:.85}
.res-head{display:flex;align-items:center;gap:12px;padding:14px 16px}
.res-stripe{width:4px;align-self:stretch;border-radius:2px;flex-shrink:0}
.res-info{flex:1;min-width:0}
.res-name{font-size:15px;font-weight:600;color:var(--white);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.res-meta{font-size:12px;color:var(--muted);margin-top:3px}
.res-arrow{color:var(--faint);font-size:13px;transition:transform .2s;flex-shrink:0}
.res-card.open .res-arrow{transform:rotate(180deg)}
.res-detail{padding:0 16px 14px;border-top:1px solid var(--border);animation:fadeIn .2s ease both}
.detail-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px 16px;margin:12px 0}
.di-label{font-size:10px;color:var(--muted);letter-spacing:.08em;text-transform:uppercase;font-weight:500}
.di-val{font-size:14px;color:var(--white);margin-top:2px;word-break:break-all}
.di-full{grid-column:1/-1}

.badge{display:inline-block;padding:2px 10px;border-radius:20px;font-size:10px;font-family:'Rajdhani',sans-serif;font-weight:700;letter-spacing:.07em;text-transform:uppercase;flex-shrink:0}
.bp{background:#F59E0B18;color:#F59E0B;border:1px solid #F59E0B44}
.bc{background:#00B24B18;color:#00B24B;border:1px solid #00B24B44}
.bco{background:#88888818;color:#888;border:1px solid #88888844}
.bca{background:#E5393518;color:#E53935;border:1px solid #E5393544}

.s-pills{display:flex;flex-wrap:wrap;gap:6px;margin:10px 0}
.s-pill{padding:4px 12px;border-radius:14px;font-size:11px;border:1px solid var(--border);color:var(--muted);cursor:pointer;background:none;font-family:'Rajdhani',sans-serif;font-weight:600;letter-spacing:.05em;text-transform:uppercase;transition:all .15s}
.s-pill.on{border-color:var(--green);color:var(--green);background:var(--green-bg)}

.fab{position:fixed;bottom:calc(var(--safe-bot)+72px);right:20px;width:54px;height:54px;border-radius:27px;background:var(--green);border:none;cursor:pointer;font-size:26px;color:var(--white);display:flex;align-items:center;justify-content:center;box-shadow:0 4px 20px #00B24B55;z-index:20}
.fab:active{transform:scale(.92)}

#modal-overlay{position:fixed;inset:0;z-index:100;background:#000c;backdrop-filter:blur(4px);display:none;align-items:flex-end;justify-content:center}
#modal-overlay.show{display:flex;animation:fadeIn .2s ease both}
.modal-sheet{background:var(--s1);border-radius:20px 20px 0 0;border:1px solid var(--border);border-bottom:none;width:100%;max-width:480px;max-height:92vh;overflow-y:auto;animation:slideUp .25s cubic-bezier(.4,0,.2,1) both;padding-bottom:calc(var(--safe-bot)+8px)}
.modal-handle{width:36px;height:4px;border-radius:2px;background:var(--border2);margin:12px auto 4px}
.modal-hd{padding:8px 18px 14px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.modal-title{font-family:'Rajdhani',sans-serif;font-size:19px;font-weight:700;letter-spacing:.04em}
.modal-close{background:none;border:none;color:var(--muted);font-size:22px;cursor:pointer;padding:4px}
.modal-body{padding:16px 18px}

.fg{margin-bottom:16px}
.fl{display:block;font-size:11px;color:var(--muted);letter-spacing:.09em;text-transform:uppercase;font-weight:600;margin-bottom:6px;font-family:'Rajdhani',sans-serif}
.fl span{color:var(--green)}
.fi,.fs,.ft{width:100%;padding:11px 14px;background:var(--s3);border:1px solid var(--border2);border-radius:8px;color:var(--white);font-family:'Inter',sans-serif;font-size:15px;outline:none;transition:all .15s;-webkit-appearance:none;appearance:none}
.fi:focus,.fs:focus,.ft:focus{border-color:var(--green);box-shadow:0 0 0 3px var(--green-bg)}
.ft{resize:vertical;min-height:72px}
.fe{font-size:12px;color:var(--red);margin-top:4px}
.frow{display:grid;grid-template-columns:1fr 1fr;gap:12px}

.party-grid{display:flex;flex-wrap:wrap;gap:6px}
.pb{width:40px;height:36px;border-radius:6px;border:1px solid var(--border2);background:var(--s3);color:var(--white);font-family:'Rajdhani',sans-serif;font-size:16px;font-weight:700;cursor:pointer;transition:all .15s}
.pb.on{background:var(--green);border-color:var(--green);box-shadow:0 0 10px #00B24B44}
.pm{padding:0 12px;height:36px;border-radius:6px;border:1px solid var(--border2);background:var(--s3);color:var(--muted);font-size:11px;cursor:pointer;font-family:'Rajdhani',sans-serif;font-weight:600}
.pm.on{border-color:var(--green);color:var(--green);background:var(--green-bg)}

.type-grid{display:flex;flex-wrap:wrap;gap:8px}
.tb{display:flex;align-items:center;gap:6px;padding:8px 14px;border-radius:8px;border:1px solid var(--border2);background:var(--s3);cursor:pointer;transition:all .15s;font-size:13px;font-family:'Rajdhani',sans-serif;font-weight:600;letter-spacing:.03em;color:var(--muted)}
.tb.on{border-color:var(--tc,var(--green));color:var(--tc,var(--green));background:color-mix(in srgb,var(--tc,var(--green)) 12%,transparent);box-shadow:0 0 8px color-mix(in srgb,var(--tc,var(--green)) 25%,transparent)}

.btn{padding:11px 20px;border-radius:8px;border:none;font-family:'Rajdhani',sans-serif;font-size:15px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;cursor:pointer;transition:all .18s;display:inline-flex;align-items:center;gap:6px;justify-content:center}
.btn:disabled{opacity:.5;cursor:not-allowed}
.btn-p{background:var(--green);color:var(--white)}
.btn-p:not(:disabled):active{background:var(--green-d)}
.btn-o{background:transparent;color:var(--muted);border:1px solid var(--border2)}
.btn-d{background:var(--red-bg);color:var(--red);border:1px solid #E5393544}
.btn-w{width:100%}
.btn-s{padding:7px 14px;font-size:13px}
.arow{display:flex;gap:8px;margin-top:14px}
.spin{width:14px;height:14px;border:2px solid rgba(255,255,255,.3);border-top-color:#fff;border-radius:50%;animation:spin .7s linear infinite;display:inline-block}

.tipo-card{background:var(--s2);border:1px solid var(--border);border-radius:12px;padding:14px 16px;margin-bottom:10px;display:flex;align-items:flex-start;gap:14px}
.tipo-emoji{font-size:26px;flex-shrink:0;margin-top:2px}
.tipo-info{flex:1;min-width:0}
.tipo-name{font-size:16px;font-weight:600;font-family:'Rajdhani',sans-serif;letter-spacing:.03em;color:var(--white)}
.tipo-desc{font-size:13px;color:var(--muted);margin-top:3px;line-height:1.4}
.tipo-acts{display:flex;gap:6px;flex-shrink:0;flex-wrap:wrap;justify-content:flex-end}
.itag{display:inline-block;padding:1px 7px;border-radius:3px;font-size:10px;font-family:'Rajdhani',sans-serif;font-weight:700;letter-spacing:.07em;text-transform:uppercase;background:var(--s3);color:var(--faint);border:1px solid var(--border);margin-left:6px;vertical-align:middle}

.swatches{display:flex;flex-wrap:wrap;gap:8px;align-items:center}
.sw{width:28px;height:28px;border-radius:50%;cursor:pointer;border:3px solid transparent;transition:all .15s;flex-shrink:0}
.sw.on{border-color:var(--white);box-shadow:0 0 8px rgba(255,255,255,.4)}
.cc-wrap{position:relative;width:28px;height:28px}
.cc-native{opacity:0;position:absolute;inset:0;width:100%;height:100%;cursor:pointer}
.cc-circle{width:28px;height:28px;border-radius:50%;border:2px dashed var(--border2);display:flex;align-items:center;justify-content:center;font-size:14px;pointer-events:none}
.eg{display:flex;flex-wrap:wrap;gap:6px}
.eb{width:36px;height:36px;border-radius:6px;border:1px solid var(--border);background:var(--s3);cursor:pointer;font-size:18px;transition:all .15s}
.eb.on{border-color:var(--green);background:var(--green-bg)}

.search-bar{position:relative;margin-bottom:12px}
.search-bar input{width:100%;padding:10px 14px 10px 38px;background:var(--s2);border:1px solid var(--border);border-radius:8px;color:var(--white);font-family:'Inter',sans-serif;font-size:15px;outline:none}
.search-bar input:focus{border-color:var(--green)}
.si{position:absolute;left:12px;top:50%;transform:translateY(-50%);color:var(--muted);font-size:16px}
.frow2{display:flex;gap:6px;overflow-x:auto;padding-bottom:4px;margin-bottom:12px;scrollbar-width:none}
.frow2::-webkit-scrollbar{display:none}
.fc{flex-shrink:0;padding:5px 14px;border-radius:14px;border:1px solid var(--border);background:none;color:var(--muted);font-size:12px;cursor:pointer;font-family:'Rajdhani',sans-serif;font-weight:600;letter-spacing:.04em;text-transform:uppercase;transition:all .15s;white-space:nowrap}
.fc.on{border-color:var(--green);color:var(--green);background:var(--green-bg)}

.divider{height:1px;background:var(--border);margin:14px 0}
.info-box{background:var(--green-xb);border:1px solid #00B24B22;border-radius:8px;padding:12px 14px;margin-top:14px;font-size:13px;color:var(--muted);line-height:1.6}
.info-box strong{color:var(--white)}
.sec-hd{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px}
.sec-title{font-family:'Rajdhani',sans-serif;font-size:22px;font-weight:700;letter-spacing:.03em;color:var(--white)}
.sec-sub{font-size:13px;color:var(--muted);margin-top:1px}
.card{background:var(--s2);border:1px solid var(--border);border-radius:12px;overflow:hidden;margin-bottom:10px}
.card-body{padding:14px 16px}
.next-banner{background:var(--green-bg);border:1px solid #00B24B44;border-radius:12px;padding:14px 16px;margin-bottom:14px;display:flex;align-items:center;gap:14px}
.empty{text-align:center;padding:48px 24px}
.empty-icon{font-size:44px;margin-bottom:14px;opacity:.5}
.empty-t{font-size:17px;color:var(--muted);font-weight:500}
.empty-s{font-size:13px;color:var(--faint);margin-top:6px}
.chip{display:inline-flex;align-items:center;gap:5px;padding:4px 12px;border-radius:6px;font-size:12px;font-family:'Rajdhani',sans-serif;font-weight:600;letter-spacing:.04em;border:1px solid}

/* ── PIN SCREEN ──────────────────────────────────── */
#pin-screen{position:fixed;inset:0;z-index:9999;background:var(--black);display:flex;flex-direction:column;align-items:center;justify-content:center;padding:32px 24px;animation:fadeIn .3s ease both}
#pin-screen.hidden{display:none}
.pin-logo{width:64px;height:64px;border-radius:16px;background:var(--green);display:flex;align-items:center;justify-content:center;font-size:34px;box-shadow:0 0 30px #00B24B55;margin-bottom:20px}
.pin-title{font-family:'Rajdhani',sans-serif;font-weight:700;font-size:26px;letter-spacing:.06em;color:var(--white);text-align:center;line-height:1}
.pin-sub{font-size:13px;color:var(--muted);text-align:center;margin-top:6px;margin-bottom:36px}
.pin-dots{display:flex;gap:14px;margin-bottom:36px}
.pin-dot{width:16px;height:16px;border-radius:50%;border:2px solid var(--border2);background:transparent;transition:all .15s}
.pin-dot.filled{background:var(--green);border-color:var(--green);box-shadow:0 0 8px var(--green)}
.pin-dot.error{background:var(--red);border-color:var(--red);animation:shake .3s ease}
.pin-pad{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;width:100%;max-width:280px}
.pin-key{height:68px;border-radius:14px;border:1px solid var(--border2);background:var(--s2);color:var(--white);font-family:'Rajdhani',sans-serif;font-size:26px;font-weight:600;cursor:pointer;transition:all .15s;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;user-select:none}
.pin-key:active{background:var(--green);border-color:var(--green);transform:scale(.94)}
.pin-key .pk-letters{font-size:8px;letter-spacing:.1em;color:var(--muted);font-weight:500}
.pin-key.pin-del{font-size:20px;background:transparent;border-color:var(--border)}
.pin-key.pin-zero{grid-column:2}
.pin-error-msg{font-size:13px;color:var(--red);text-align:center;margin-top:16px;min-height:18px;font-family:'Rajdhani',sans-serif;letter-spacing:.05em}
@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-8px)}75%{transform:translateX(8px)}}

</style>
</head>
<body>
<div id="root">
  <div id="topbar">
    <div class="logo-wrap">
      <div class="logo-icon">🍺</div>
      <div><div class="logo-text">GAUKLER</div><div class="logo-sub">Panel de Reservas</div></div>
    </div>
    <div style="text-align:right">
      <div id="topbar-date" style="font-size:11px;color:var(--muted)"></div>
      <div style="font-size:10px;color:var(--muted);margin-top:2px">
        <span id="sync-lbl">Conectando…</span><span id="sync-dot" class="sync-dot sync-loading"></span>
      </div>
    </div>
  </div>

  <div id="content" style="display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;gap:14px">
    <div style="width:44px;height:44px;border:3px solid var(--border);border-top-color:var(--green);border-radius:50%;animation:spin .8s linear infinite"></div>
    <div style="font-family:'Rajdhani',sans-serif;font-size:13px;letter-spacing:.1em;color:var(--muted);text-transform:uppercase">Cargando datos…</div>
  </div>

  <div id="nav">
    <button class="nav-btn active" onclick="navigate('dashboard')" id="nav-dashboard"><div class="nav-icon">⚡</div><div class="nav-label">Inicio</div></button>
    <button class="nav-btn" onclick="navigate('reservas')" id="nav-reservas"><div class="nav-icon">📋</div><div class="nav-label">Reservas</div></button>
    <button class="nav-btn" onclick="navigate('tipos')" id="nav-tipos"><div class="nav-icon">🏷️</div><div class="nav-label">Tipos</div></button>
  </div>
</div>

<div id="modal-overlay" onclick="closeModal(event)">
  <div class="modal-sheet" id="modal-sheet"></div>
</div>

<script>
// ── FIREBASE ──────────────────────────────────────
firebase.initializeApp({
  apiKey:"AIzaSyC8_Nj5mqZq0LwhJEQxnD0wj1Li9n753Ek",
  authDomain:"gaukler-reservas.firebaseapp.com",
  projectId:"gaukler-reservas",
  storageBucket:"gaukler-reservas.firebasestorage.app",
  messagingSenderId:"40036796342",
  appId:"1:40036796342:web:782fefdb800d68094ee317"
});
const db = firebase.firestore();
db.enablePersistence().catch(()=>{});

// ── CONSTANTS ─────────────────────────────────────
const DEFAULT_TIPOS = [
  {id:'t1',name:'Standard',      emoji:'🍺',color:'#00B24B',desc:'Reserva estándar de mesa.',                   active:true},
  {id:'t2',name:'Cumpleaños',    emoji:'🎂',color:'#9B59B6',desc:'Mesa decorada, trato especial al festejado.', active:true},
  {id:'t3',name:'Pizza Libre',   emoji:'🍕',color:'#E67E22',desc:'Combo pizza + birra ilimitada.',              active:true},
  {id:'t4',name:'Evento Privado',emoji:'🎉',color:'#2980B9',desc:'Sector o salón reservado en exclusiva.',      active:true},
  {id:'t5',name:'Maridaje',      emoji:'🧀',color:'#27AE60',desc:'Cervezas especiales con tabla de quesos.',    active:true},
];
const SLOTS=['18:00','18:30','19:00','19:30','20:00','20:30','21:00','21:30','22:00','22:30','23:00','23:30','00:00','00:30','01:00','01:30','02:00','02:30','03:00'];
const ST={
  pendiente:{l:'Pendiente',c:'bp'},
  confirmada:{l:'Confirmada',c:'bc'},
  completada:{l:'Completada',c:'bco'},
  cancelada:{l:'Cancelada',c:'bca'},
};
const EMOJIS=['🍺','🎂','🍕','🎉','🧀','🍻','🥂','🎵','🌙','⚡','🔥','🎸','🍾','🎊','🥃','🫀','🪩','🌮'];
const COLORS=['#00B24B','#9B59B6','#E67E22','#2980B9','#27AE60','#E74C3C','#1ABC9C','#F39C12','#8E44AD','#D35400'];

// ── STATE ─────────────────────────────────────────
let reservas=[], tipos=[], loaded={r:false,t:false};
let currentView='dashboard', openCards=new Set();
let resFilter={search:'',type:'',status:''};
let formData={}, modalMode=null, editTarget=null, deleteTarget=null;

// ── HELPERS ───────────────────────────────────────
const todayISO=()=>new Date().toISOString().split('T')[0];
const nowTime=()=>new Date().toTimeString().slice(0,5);
const gklCode=()=>'GKL-'+Math.random().toString(36).toUpperCase().slice(2,8);
function fmtDate(iso){if(!iso)return'';const[y,m,d]=iso.split('-');return`${d}/${['Ene','Feb','Mar','Abr','May','Jun','Jul','Ago','Sep','Oct','Nov','Dic'][+m-1]}/${y}`;}
function esc(s=''){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function sync(state){
  const d=document.getElementById('sync-dot'),l=document.getElementById('sync-lbl');
  if(!d||!l)return;
  d.className='sync-dot '+(state==='ok'?'sync-ok':state==='off'?'sync-off':'sync-loading');
  l.textContent=state==='ok'?'Sincronizado':state==='off'?'Sin conexión':'Conectando…';
}

// ── FIRESTORE LISTENERS ───────────────────────────
function startListeners(){
  // Sin orderBy para evitar requerir índices compuestos
  // El ordenamiento se hace del lado del cliente
  db.collection('tipos').onSnapshot(snap=>{
    tipos=snap.docs.map(d=>({id:d.id,...d.data()}));
    // Ordenar por nombre si no tienen createdAt
    tipos.sort((a,b)=>(a.name||'').localeCompare(b.name||''));
    if(!loaded.t&&tipos.length===0) seedTipos();
    loaded.t=true;
    sync('ok');
    checkReady();
    if(currentView==='tipos') render();
  }, err=>{
    console.error('Error tipos:', err.code, err.message);
    loaded.t=true; // Desbloquear aunque haya error
    sync('off');
    showFirebaseError(err.code);
    checkReady();
  });

  db.collection('reservas').onSnapshot(snap=>{
    reservas=snap.docs.map(d=>({id:d.id,...d.data()}));
    // Ordenar client-side: más recientes primero
    reservas.sort((a,b)=>{
      if(a.date!==b.date) return (b.date||'').localeCompare(a.date||'');
      return (a.time||'').localeCompare(b.time||'');
    });
    loaded.r=true;
    sync('ok');
    checkReady();
    if(currentView!=='tipos') render();
  }, err=>{
    console.error('Error reservas:', err.code, err.message);
    loaded.r=true; // Desbloquear aunque haya error
    sync('off');
    showFirebaseError(err.code);
    checkReady();
  });
}

function showFirebaseError(code){
  const el=document.getElementById('content');
  if(!el) return;
  let msg='Error de conexión con Firebase.';
  if(code==='permission-denied') msg='⛔ Acceso denegado. Las reglas de Firestore no permiten lectura. Actualizalas en la consola de Firebase.';
  else if(code==='unavailable')  msg='📡 Sin conexión. Verificá el internet e intentá de nuevo.';
  // Solo mostrar si no cargó nada aún
  if(!loaded.r||!loaded.t){
    el.innerHTML=`<div style="display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;padding:32px;text-align:center;gap:16px">
      <div style="font-size:40px">⚠️</div>
      <div style="font-family:'Rajdhani',sans-serif;font-size:16px;color:var(--red);line-height:1.5">${msg}</div>
      <div style="font-size:12px;color:var(--muted)">Código: ${code}</div>
      <button class="btn btn-p" onclick="location.reload()">🔄 Reintentar</button>
    </div>`;
  }
}

function checkReady(){if(loaded.r&&loaded.t) render();}

async function seedTipos(){
  try{
    const b=db.batch();
    DEFAULT_TIPOS.forEach(t=>b.set(db.collection('tipos').doc(t.id),{...t,createdAt:firebase.firestore.FieldValue.serverTimestamp()}));
    await b.commit();
  }catch(e){ console.error('seedTipos error:',e); }
}

// ── DB OPS ────────────────────────────────────────
const TS=()=>firebase.firestore.FieldValue.serverTimestamp();
const addR=d=>db.collection('reservas').add({...d,code:gklCode(),createdAt:TS()});
const updR=(id,d)=>db.collection('reservas').doc(id).update(d);
const delR=id=>db.collection('reservas').doc(id).delete();
const updStatus=(id,s)=>db.collection('reservas').doc(id).update({status:s});
const addT=d=>db.collection('tipos').add({...d,createdAt:TS()});
const updT=(id,d)=>db.collection('tipos').doc(id).update(d);
const delT=id=>db.collection('tipos').doc(id).delete();

// ── NAVIGATION ────────────────────────────────────
function navigate(v){
  currentView=v;
  document.querySelectorAll('.nav-btn').forEach(b=>b.classList.remove('active'));
  document.getElementById('nav-'+v)?.classList.add('active');
  openCards.clear(); render();
}

// ── RENDER ────────────────────────────────────────
function render(){
  if(!loaded.r||!loaded.t)return;
  const el=document.getElementById('content');
  if(currentView==='dashboard')el.innerHTML=renderDash();
  else if(currentView==='reservas')el.innerHTML=renderRes();
  else if(currentView==='tipos')el.innerHTML=renderTipos();
  el.scrollTop=0;
}

// ── DASHBOARD ─────────────────────────────────────
function renderDash(){
  const today=todayISO(), now=nowTime();
  const todayR=reservas.filter(r=>r.date===today&&r.status!=='cancelada');
  const pax=todayR.reduce((s,r)=>s+(r.party||0),0);
  const conf=todayR.filter(r=>r.status==='confirmada').length;
  const pend=todayR.filter(r=>r.status==='pendiente').length;
  const sorted=[...todayR].sort((a,b)=>(a.time||'').localeCompare(b.time||''));
  const next=sorted.find(r=>(r.time||'')>=now);
  const dateStr=new Date().toLocaleDateString('es-AR',{weekday:'long',day:'numeric',month:'long'});

  let nb='';
  if(next){const t=tipos.find(x=>x.id===next.typeId)||{};nb=`<div class="next-banner"><div style="font-size:28px;flex-shrink:0">⏰</div><div><div style="font-size:10px;color:var(--green);letter-spacing:.1em;text-transform:uppercase;font-family:'Rajdhani',sans-serif;font-weight:600">Próxima</div><div style="font-size:16px;font-weight:600;margin-top:2px">${esc(next.name)} — ${next.time} hs</div><div style="font-size:12px;color:var(--muted);margin-top:3px">${next.party} personas · ${esc(t.name||'')}</div></div></div>`;}

  const tl=sorted.length===0
    ?`<div class="empty" style="padding:28px 0"><div class="empty-icon">🍺</div><div class="empty-t">Sin reservas para hoy</div><div class="empty-s">Tocá + para agregar</div></div>`
    :sorted.map(r=>{const t=tipos.find(x=>x.id===r.typeId)||{};const p=r.time<now&&r.status==='completada';return`<div class="tl-item"><div class="tl-time" style="color:${p?'var(--faint)':'var(--white)'}">${r.time}</div><div class="tl-dot ${p?'past':''}"></div><div style="flex:1;min-width:0"><div style="font-size:15px;font-weight:500">${esc(r.name)}</div><div style="font-size:12px;color:var(--muted);margin-top:3px">${r.party} pers. · ${t.emoji||''} ${esc(t.name||'')} · <span class="badge ${ST[r.status]?.c||'bp'}">${ST[r.status]?.l||r.status}</span></div></div></div>`;}).join('');

  return`<div class="view"><div class="sec-hd"><div><div class="sec-title">Dashboard</div><div class="sec-sub" style="text-transform:capitalize">${dateStr}</div></div></div>
  <div class="stats-grid">
    <div class="stat-card stat-accent"><div class="stat-val">${todayR.length}</div><div class="stat-lbl">Reservas hoy</div><div class="stat-icon">📋</div></div>
    <div class="stat-card"><div class="stat-val">${pax}</div><div class="stat-lbl">Pax esperados</div><div class="stat-icon">👥</div></div>
    <div class="stat-card"><div class="stat-val" style="color:#00B24B">${conf}</div><div class="stat-lbl">Confirmadas</div><div class="stat-icon">✅</div></div>
    <div class="stat-card"><div class="stat-val" style="color:#F59E0B">${pend}</div><div class="stat-lbl">Pendientes</div><div class="stat-icon">⏳</div></div>
  </div>
  ${nb}
  <div style="font-family:'Rajdhani',sans-serif;font-size:13px;letter-spacing:.07em;text-transform:uppercase;color:var(--muted);margin-bottom:12px">Timeline de hoy</div>
  <div class="card"><div class="card-body" style="padding:4px 16px">${tl}</div></div>
  </div><button class="fab" onclick="openNewR()">+</button>`;
}

// ── RESERVAS LIST ─────────────────────────────────
function renderRes(){
  let f=[...reservas];
  const{search,type,status}=resFilter;
  if(search)f=f.filter(r=>r.name?.toLowerCase().includes(search.toLowerCase())||r.phone?.includes(search)||r.code?.includes(search.toUpperCase()));
  if(type)f=f.filter(r=>r.typeId===type);
  if(status)f=f.filter(r=>r.status===status);
  f.sort((a,b)=>a.date===b.date?(a.time||'').localeCompare(b.time||''):(b.date||'').localeCompare(a.date||''));

  const tcs=tipos.map(t=>`<button class="fc ${resFilter.type===t.id?'on':''}" onclick="setTF('${t.id}')">${t.emoji} ${esc(t.name)}</button>`).join('');
  const scs=Object.entries(ST).map(([k,v])=>`<button class="fc ${resFilter.status===k?'on':''}" onclick="setSF('${k}')">${v.l}</button>`).join('');

  const cards=f.length===0
    ?`<div class="empty"><div class="empty-icon">📋</div><div class="empty-t">Sin resultados</div><div class="empty-s">Probá cambiando los filtros</div></div>`
    :f.map(r=>{
      const t=tipos.find(x=>x.id===r.typeId)||{};
      const st=ST[r.status]||ST.pendiente;
      const op=openCards.has(r.id);
      let det='';
      if(op)det=`<div class="res-detail">
        <div class="detail-grid">
          <div><div class="di-label">📞 Teléfono</div><div class="di-val">${esc(r.phone)}</div></div>
          ${r.email?`<div><div class="di-label">✉️ Email</div><div class="di-val">${esc(r.email)}</div></div>`:''}
          <div><div class="di-label">🎟 Código</div><div class="di-val" style="color:var(--green);font-family:'Rajdhani',sans-serif;font-weight:700">${r.code}</div></div>
          <div><div class="di-label">📅 Fecha</div><div class="di-val">${fmtDate(r.date)}</div></div>
          <div><div class="di-label">⏰ Hora</div><div class="di-val">${r.time} hs</div></div>
          <div><div class="di-label">👥 Personas</div><div class="di-val">${r.party}</div></div>
          ${r.notes?`<div class="di-full"><div class="di-label">📝 Notas</div><div class="di-val">${esc(r.notes)}</div></div>`:''}
        </div>
        <div class="s-pills">
          ${Object.entries(ST).map(([k,v])=>`<button class="s-pill ${r.status===k?'on':''}" onclick="updStatus('${r.id}','${k}')">${v.l}</button>`).join('')}
        </div>
        <div class="arow">
          <button class="btn btn-o btn-s" onclick="openEditR('${r.id}')">✎ Editar</button>
          <button class="btn btn-d btn-s" onclick="confirmDelR('${r.id}','${esc(r.name)}')">✕ Eliminar</button>
        </div>
      </div>`;
      return`<div class="res-card ${op?'open':''}"><div class="res-head" onclick="toggleCard('${r.id}')">
        <div class="res-stripe" style="background:${t.color||'var(--green)'}"></div>
        <div style="font-size:22px;flex-shrink:0">${t.emoji||'🍺'}</div>
        <div class="res-info"><div class="res-name">${esc(r.name)}</div><div class="res-meta">📅 ${fmtDate(r.date)} · ⏰ ${r.time} hs · 👥 ${r.party} pers.</div></div>
        <span class="badge ${st.c}">${st.l}</span>
        <div class="res-arrow">▾</div>
      </div>${det}</div>`;
    }).join('');

  return`<div class="view"><div class="sec-hd"><div><div class="sec-title">Reservas <span style="font-size:15px;color:var(--muted);font-weight:400">(${f.length})</span></div></div></div>
  <div class="search-bar"><span class="si">🔍</span><input value="${esc(search)}" oninput="setSearch(this.value)" placeholder="Nombre, teléfono o código…" type="search"/></div>
  <div class="frow2"><button class="fc ${!resFilter.type&&!resFilter.status?'on':''}" onclick="clearF()">Todos</button>${tcs}${scs}</div>
  ${cards}</div><button class="fab" onclick="openNewR()">+</button>`;
}

// ── TIPOS LIST ────────────────────────────────────
function renderTipos(){
  const cards=tipos.map(t=>`
    <div class="tipo-card" style="border-left:3px solid ${t.color};opacity:${t.active?1:.5}">
      <div class="tipo-emoji">${t.emoji}</div>
      <div class="tipo-info">
        <div class="tipo-name">${esc(t.name)}${!t.active?'<span class="itag">Inactivo</span>':''}</div>
        ${t.desc?`<div class="tipo-desc">${esc(t.desc)}</div>`:''}
        <div style="margin-top:8px"><span class="chip" style="color:${t.color};border-color:${t.color}44;background:${t.color}12">${t.emoji} ${esc(t.name)}</span></div>
      </div>
      <div class="tipo-acts">
        <button class="btn btn-o btn-s" onclick="openEditT('${t.id}')">✎</button>
        <button class="btn btn-o btn-s" onclick="toggleT('${t.id}',${t.active})" style="font-size:11px">${t.active?'OFF':'ON'}</button>
        ${tipos.length>1?`<button class="btn btn-d btn-s" onclick="confirmDelT('${t.id}','${esc(t.name)}')">✕</button>`:''}
      </div>
    </div>`).join('');
  return`<div class="view"><div class="sec-hd"><div><div class="sec-title">Tipos de Reserva</div><div class="sec-sub">Categorizá tus reservas</div></div><button class="btn btn-p" onclick="openNewT()">+ Nuevo</button></div>
  ${cards}<div class="info-box">💡 Los tipos <strong>inactivos</strong> no aparecen al crear nuevas reservas, pero las reservas existentes no se ven afectadas.</div></div>`;
}

// ── FILTER / CARD ACTIONS ─────────────────────────
function setSearch(v){resFilter.search=v;render();}
function setTF(id){resFilter.type=resFilter.type===id?'':id;render();}
function setSF(s){resFilter.status=resFilter.status===s?'':s;render();}
function clearF(){resFilter={search:'',type:'',status:''};render();}
function toggleCard(id){openCards.has(id)?openCards.delete(id):openCards.add(id);render();}
function toggleT(id,cur){updT(id,{active:!cur});}

// ── RESERVA FORM ──────────────────────────────────
function openNewR(){modalMode='new-r';editTarget=null;formData={name:'',phone:'',email:'',date:todayISO(),time:'20:00',party:2,typeId:'',notes:'',status:'pendiente'};renderModal();}
function openEditR(id){const r=reservas.find(r=>r.id===id);if(!r)return;modalMode='edit-r';editTarget=id;formData={...r};renderModal();}

function rFormHTML(){
  const isE=modalMode==='edit-r',fd=formData;
  const ats=tipos.filter(t=>t.active);
  const topts=SLOTS.map(t=>`<option value="${t}" ${fd.time===t?'selected':''}>${t} hs</option>`).join('');
  const pbts=[1,2,3,4,5,6,7,8].map(n=>`<button class="pb ${fd.party===n?'on':''}" onclick="fp('party',${n});rp()">${n}</button>`).join('');
  const tbs=ats.map(t=>`<button class="tb ${fd.typeId===t.id?'on':''}" style="--tc:${t.color}" onclick="fp('typeId','${t.id}');rt()"><span style="font-size:16px">${t.emoji}</span>${esc(t.name)}</button>`).join('');
  const sr=isE?`<div class="fg"><label class="fl">Estado</label><select class="fs" onchange="fp('status',this.value)">${Object.entries(ST).map(([k,v])=>`<option value="${k}" ${fd.status===k?'selected':''}>${v.l}</option>`).join('')}</select></div>`:'';
  return`<div class="modal-handle"></div>
  <div class="modal-hd"><div class="modal-title">${isE?'Editar Reserva':'Nueva Reserva'}</div><button class="modal-close" onclick="closeModal()">×</button></div>
  <div class="modal-body">
    <div class="fg"><label class="fl">Nombre del cliente <span>*</span></label><input class="fi" id="fi-n" value="${esc(fd.name)}" oninput="fp('name',this.value)" placeholder="Nombre y apellido" autocomplete="off"/><div class="fe" id="fe-n"></div></div>
    <div class="frow">
      <div class="fg"><label class="fl">Teléfono <span>*</span></label><input class="fi" id="fi-p" value="${esc(fd.phone)}" oninput="fp('phone',this.value)" placeholder="+54 223…" type="tel"/><div class="fe" id="fe-p"></div></div>
      <div class="fg"><label class="fl">Email</label><input class="fi" value="${esc(fd.email)}" oninput="fp('email',this.value)" placeholder="opcional" type="email"/></div>
    </div>
    <div class="frow">
      <div class="fg"><label class="fl">Fecha <span>*</span></label><input class="fi" id="fi-d" value="${fd.date}" oninput="fp('date',this.value)" type="date" min="${todayISO()}"/><div class="fe" id="fe-d"></div></div>
      <div class="fg"><label class="fl">Horario</label><select class="fs" onchange="fp('time',this.value)">${topts}</select></div>
    </div>
    <div class="fg"><label class="fl">Personas <span>*</span></label>
      <div class="party-grid" id="pg">${pbts}<button class="pm ${fd.party>=9?'on':''}" id="pm-btn" onclick="pLarge()">${fd.party>=9?fd.party+' pers.':'+8'}</button>${fd.party>=9?`<button class="btn btn-o btn-s" style="height:36px;width:36px;padding:0" onclick="fp('party',Math.max(9,formData.party-1));rp()">−</button><button class="btn btn-o btn-s" style="height:36px;width:36px;padding:0" onclick="fp('party',formData.party+1);rp()">+</button>`:''}</div>
    </div>
    <div class="fg"><label class="fl">Tipo de reserva <span>*</span></label><div class="type-grid" id="tg">${tbs}</div><div class="fe" id="fe-t"></div></div>
    ${sr}
    <div class="fg"><label class="fl">Notas</label><textarea class="ft" oninput="fp('notes',this.value)" placeholder="Alergias, ocasión especial, preferencia de mesa…">${esc(fd.notes)}</textarea></div>
    <div class="divider"></div>
    <div class="arow">
      <button class="btn btn-o" onclick="closeModal()">Cancelar</button>
      <button class="btn btn-p btn-w" onclick="saveR(this)" id="btn-sr">${isE?'✓ Guardar':'✓ Crear Reserva'}</button>
    </div>
  </div>`;
}

function fp(k,v){formData[k]=v;}
function rp(){document.querySelectorAll('.pb').forEach((b,i)=>b.classList.toggle('on',i+1===formData.party));const m=document.getElementById('pm-btn');if(m){m.classList.toggle('on',formData.party>=9);m.textContent=formData.party>=9?formData.party+' pers.':'+8';}}
function rt(){document.querySelectorAll('#tg .tb').forEach(b=>b.classList.toggle('on',b.getAttribute('onclick').includes("'"+formData.typeId+"'")));}
function pLarge(){if(formData.party<9)formData.party=9;renderModal();}

async function saveR(btn){
  let ok=true;
  const se=(id,m)=>{const e=document.getElementById(id);if(e)e.textContent=m;};
  ['fe-n','fe-p','fe-d','fe-t'].forEach(id=>se(id,''));
  if(!formData.name?.trim()){se('fe-n','Requerido');ok=false;}
  if(!formData.phone?.trim()){se('fe-p','Requerido');ok=false;}
  if(!formData.date){se('fe-d','Requerido');ok=false;}
  if(!formData.typeId){se('fe-t','Seleccioná un tipo');ok=false;}
  if(!ok)return;
  btn.disabled=true;btn.innerHTML='<span class="spin"></span> Guardando…';
  try{
    const{id,code,createdAt,...data}=formData;
    if(modalMode==='edit-r')await updR(editTarget,data);
    else await addR(data);
    closeModal();
  }catch(e){btn.disabled=false;btn.innerHTML=modalMode==='edit-r'?'✓ Guardar':'✓ Crear Reserva';alert('Error: '+e.message);}
}

// ── TIPO FORM ─────────────────────────────────────
function openNewT(){modalMode='new-t';editTarget=null;formData={name:'',emoji:'🍺',color:'#00B24B',desc:'',active:true};renderModal();}
function openEditT(id){const t=tipos.find(t=>t.id===id);if(!t)return;modalMode='edit-t';editTarget=id;formData={...t};renderModal();}

  <div class="modal-body">
    <div class="fg"><label class="fl">Nombre <span>*</span></label><input class="fi" id="fi-tn" value="${esc(fd.name)}" oninput="fp('name',this.value);uprev()" placeholder="Ej: Pizza Libre" autocomplete="off"/><div class="fe" id="fe-tn"></div></div>
    <div class="fg"><label class="fl">Ícono</label><div class="eg">${eg}</div></div>
    <div class="fg"><label class="fl">Color</label><div class="swatches">${sws}<div class="cc-wrap"><div class="cc-circle" id="cc" style="background:${fd.color}"></div><input class="cc-native" type="color" value="${fd.color}" oninput="setTC(this.value)"/></div></div></div>
    <div style="background:var(--s3);border:1px solid var(--border);border-radius:8px;padding:12px 14px;margin-bottom:14px">
      <div style="font-size:10px;color:var(--muted);letter-spacing:.08em;text-transform:uppercase;font-family:'Rajdhani',sans-serif;margin-bottom:8px">Vista previa</div>
      <div style="display:flex;align-items:center;gap:8px"><span id="pe" style="font-size:22px">${fd.emoji}</span><span id="pt" class="chip" style="color:${fd.color};border-color:${fd.color}44;background:${fd.color}12">${fd.emoji} ${esc(fd.name)||'Sin nombre'}</span></div>
    </div>
    <div class="fg"><label class="fl">Descripción interna</label><textarea class="ft" oninput="fp('desc',this.value)" placeholder="Descripción breve…" rows="2">${esc(fd.desc)}</textarea></div>
    <div class="divider"></div>
    <div class="arow">
      <button class="btn btn-o" onclick="closeModal()">Cancelar</button>
      <button class="btn btn-p btn-w" onclick="saveT(this)">${isE?'✓ Guardar':'✓ Crear Tipo'}</button>
    </div>
  </div>`;
}

function setTE(e){formData.emoji=e;document.querySelectorAll('.eb').forEach(b=>b.classList.toggle('on',b.textContent===e));uprev();}
function setTC(c){formData.color=c;document.querySelectorAll('.sw').forEach(s=>s.classList.toggle('on',s.getAttribute('onclick')?.includes("'"+c+"'")));const cc=document.getElementById('cc');if(cc)cc.style.background=c;uprev();}
function uprev(){const c=formData.color,e=formData.emoji,n=formData.name||'Sin nombre';const pt=document.getElementById('pt'),pe=document.getElementById('pe');if(pt){pt.style.color=c;pt.style.borderColor=c+'44';pt.style.background=c+'12';pt.textContent=e+' '+n;}if(pe)pe.textContent=e;}

async function saveT(btn){
  const el=document.getElementById('fe-tn');if(el)el.textContent='';
  if(!formData.name?.trim()){if(el)el.textContent='Requerido';return;}
  btn.disabled=true;btn.innerHTML='<span class="spin"></span>';
  try{
    const{id,createdAt,...data}=formData;
    if(modalMode==='edit-t')await updT(editTarget,data);
    else await addT(data);
    closeModal();
  }catch(e){btn.disabled=false;btn.innerHTML=modalMode==='edit-t'?'✓ Guardar':'✓ Crear Tipo';alert('Error: '+e.message);}
}

// ── CONFIRM DIALOGS ───────────────────────────────
function confirmDelR(id,name){
  deleteTarget=id;
  document.getElementById('modal-sheet').innerHTML=`<div class="modal-handle"></div><div class="modal-hd"><div class="modal-title">Eliminar Reserva</div><button class="modal-close" onclick="closeModal()">×</button></div><div class="modal-body"><div style="font-size:15px;color:var(--white);line-height:1.6;margin-bottom:20px">¿Eliminar la reserva de <strong style="color:var(--green)">${name}</strong>? Esta acción no se puede deshacer.</div><div style="display:flex;gap:8px"><button class="btn btn-o" onclick="closeModal()">Cancelar</button><button class="btn btn-d btn-w" onclick="doDelR(this)">✕ Eliminar</button></div></div>`;
  document.getElementById('modal-overlay').classList.add('show');
}
async function doDelR(btn){btn.disabled=true;btn.innerHTML='<span class="spin"></span>';await delR(deleteTarget);closeModal();}

function confirmDelT(id,name){
  deleteTarget=id;
  document.getElementById('modal-sheet').innerHTML=`<div class="modal-handle"></div><div class="modal-hd"><div class="modal-title">Eliminar Tipo</div><button class="modal-close" onclick="closeModal()">×</button></div><div class="modal-body"><div style="font-size:15px;color:var(--white);line-height:1.6;margin-bottom:20px">¿Eliminar el tipo <strong style="color:var(--green)">${name}</strong>? Las reservas existentes no se verán afectadas.</div><div style="display:flex;gap:8px"><button class="btn btn-o" onclick="closeModal()">Cancelar</button><button class="btn btn-d btn-w" onclick="doDelT(this)">✕ Eliminar</button></div></div>`;
  document.getElementById('modal-overlay').classList.add('show');
}
async function doDelT(btn){btn.disabled=true;btn.innerHTML='<span class="spin"></span>';await delT(deleteTarget);closeModal();}

// ── MODAL ─────────────────────────────────────────
function renderModal(){
  let h='';
  if(modalMode==='new-r'||modalMode==='edit-r')h=rFormHTML();
  if(modalMode==='new-t'||modalMode==='edit-t')h=tFormHTML();
  document.getElementById('modal-sheet').innerHTML=h;
  document.getElementById('modal-overlay').classList.add('show');
}
function closeModal(e){
  if(e&&e.target!==document.getElementById('modal-overlay'))return;
  document.getElementById('modal-overlay').classList.remove('show');
  modalMode=null;formData={};editTarget=null;deleteTarget=null;
}

// ── INIT ──────────────────────────────────────────
window.addEventListener('DOMContentLoaded',()=>{
  const d=new Date();
  document.getElementById('topbar-date').textContent=d.toLocaleDateString('es-AR',{weekday:'short',day:'numeric',month:'short'});
  if('serviceWorker' in navigator)navigator.serviceWorker.register('./sw.js').catch(()=>{});
  startListeners();
  initPinScreen();
});

// ── PIN LOGIC ─────────────────────────────────────
const CORRECT_PIN = '1234'; // ← CAMBIÁ ESTE PIN
const SESSION_KEY = 'gkl_auth';
let pinBuffer = '';

function pinKey(d) {
  if (pinBuffer.length >= 4) return;
  pinBuffer += d;
  updateDots();
  if (pinBuffer.length === 4) setTimeout(checkPin, 150);
}

function pinDel() {
  pinBuffer = pinBuffer.slice(0, -1);
  updateDots();
  document.getElementById('pin-err').textContent = '';
}

function updateDots() {
  for (let i = 0; i < 4; i++) {
    const d = document.getElementById('pd' + i);
    d.classList.toggle('filled', i < pinBuffer.length);
    d.classList.remove('error');
  }
}

function checkPin() {
  if (pinBuffer === CORRECT_PIN) {
    sessionStorage.setItem(SESSION_KEY, '1');
    document.getElementById('pin-screen').classList.add('hidden');
  } else {
    // Wrong PIN
    for (let i = 0; i < 4; i++) document.getElementById('pd' + i).classList.add('error');
    document.getElementById('pin-err').textContent = 'PIN incorrecto. Intentá de nuevo.';
    setTimeout(() => { pinBuffer = ''; updateDots(); }, 800);
  }
}

function initPinScreen() {
  if (sessionStorage.getItem(SESSION_KEY) === '1') {
    document.getElementById('pin-screen').classList.add('hidden');
  }
  // else stays visible
}

</script>
